spring.application.name=backend

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/shop_inventory
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Validate schema against entities, but don't auto-create/drop since we use schema.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initialize database using schema.sql
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.sql.init.separator=;;

# JWT Security Configurations
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=3600000
jwt.refresh.expiration=864000000
